; ============================================================
;  config.ini — User Configuration for Avvia_R6.bat
;  Edit the values below to match your system setup.
;  Lines starting with ; are comments and are ignored.
; ============================================================

[PATHS]
; Full path to the Overwolf executable
OVERWOLF_PATH=C:\Program Files (x86)\Overwolf\Overwolf.exe

; Full path to the Rainbow Six Siege executable (RainbowSix.exe)
GAME_EXE_PATH=C:\Program Files (x86)\Ubisoft\Ubisoft Game Launcher\games\Tom Clancy's Rainbow Six Siege\RainbowSix.exe

; Ubisoft Connect game launch URL
; Format: uplay://launch/<GameID>/0
; Rainbow Six Siege ID: 635
GAME_LAUNCH_URL=uplay://launch/635/0

[PROCESS]
; Exact name of the game process to monitor (as shown in Task Manager)
GAME_PROCESS=RainbowSix.exe

; Overwolf processes to kill on exit (comma-separated, no spaces)
OVERWOLF_PROCESSES=Overwolf.exe,OverwolfBrowser.exe

[TIMING]
; Seconds to wait after launching Overwolf before starting the game
OVERWOLF_INIT_DELAY=3

; Seconds to wait between each game process check during monitoring
MONITOR_INTERVAL=10

; How many consecutive missed checks before closing Overwolf
; (Total wait = MONITOR_INTERVAL * ABSENCE_THRESHOLD seconds)
ABSENCE_THRESHOLD=5

; Max seconds to wait for the game to launch before giving up
; (Total wait = WAIT_START_INTERVAL * MAX_START_ATTEMPTS seconds)
WAIT_START_INTERVAL=2
MAX_START_ATTEMPTS=90

